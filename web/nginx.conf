server { listen 8080; server_name _; root /usr/share/nginx/html; index index.html; location = /healthz { access_log off; return 200 'ok\n'; add_header Content-Type text/plain; } location /api/ { proxy_pass http://controller:8000; proxy_set_header X-Request-ID $request_id; proxy_set_header Host $host; } location / { try_files $uri /index.html; } }
