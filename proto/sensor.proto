syntax = "proto3";

import "google/protobuf/timestamp.proto";

package c2hunter.sensor.v1;

option go_package = "c2hunter/sensor/gen/sensorv1;sensorv1";

service SensorGateway {
  // The sensor initiates this long-lived outbound stream. The controller never
  // requires an inbound connection to a sensor. Until this gRPC gateway is
  // available, sensors use the controller's HTTP/HTTPS registration and
  // heartbeat endpoints; controller URLs therefore always include a scheme.
  rpc Connect(stream SensorEnvelope) returns (stream ControllerEnvelope);
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  INBOUND = 1;
  OUTBOUND = 2;
  BIDIRECTIONAL = 3;
  UNKNOWN = 4;
}

enum SensorStatus {
  SENSOR_STATUS_UNSPECIFIED = 0;
  ONLINE = 1;
  OFFLINE = 2;
  DEGRADED = 3;
  CAPTURING = 4;
  ERROR = 5;
}

message InterfaceInfo {
  string name = 1;
  string mac_address = 2;
  repeated string addresses = 3;
  Direction direction = 4;
  map<uint32, Direction> vlan_directions = 5;
}

message SensorRegistration {
  string sensor_id = 1;
  string name = 2;
  string hostname = 3;
  string agent_version = 4;
  string os_version = 5;
  string kernel_version = 6;
  repeated InterfaceInfo interfaces = 7;
  repeated string capabilities = 8;
  google.protobuf.Timestamp current_time = 9;
  uint64 available_disk_bytes = 10;
  uint64 received_packets = 11;
  uint64 dropped_packets = 12;
}

message Heartbeat {
  google.protobuf.Timestamp reported_at = 1;
  SensorStatus status = 2;
  double cpu_percent = 3;
  double memory_percent = 4;
  double disk_percent = 5;
  repeated string active_job_ids = 6;
  uint64 received_packets = 7;
  uint64 dropped_packets = 8;
  uint64 pending_bytes = 9;
  string last_error = 10;
}

message FlowBatch {
  string batch_id = 1;
  string sensor_id = 2;
  string capture_job_id = 3;
  uint32 schema_version = 4;
  string sha256_checksum = 5;
  bytes encoded_records = 6;
  uint64 record_count = 7;
}

message BatchAck {
  string batch_id = 1;
  bool accepted = 2;
  string error_code = 3;
  string error_message = 4;
}

message LossReport {
  string sensor_id = 1;
  uint64 lost_batches = 2;
  uint64 lost_bytes = 3;
  string reason = 4;
  int64 observed_at_unix_nano = 5;
}

message CaptureLimits {
  int64 start_time_unix_nano = 1;
  int64 end_time_unix_nano = 2;
  int64 duration_nanos = 3;
  uint64 max_packets = 4;
  uint64 max_bytes = 5;
  int64 timeout_nanos = 6;
}

message CaptureFilter {
  string bpf_expression = 1;
  repeated string source_cidrs = 2;
  repeated string destination_cidrs = 3;
  repeated uint32 source_ports = 4;
  repeated uint32 destination_ports = 5;
  repeated string protocols = 6;
  repeated uint32 ip_versions = 7;
  repeated Direction directions = 8;
  bool store_payload = 9;
  bool store_pcap = 10;
}

message CaptureCommand {
  string command_id = 1;
  string capture_job_id = 2;
  repeated string interfaces = 3;
  CaptureLimits limits = 4;
  CaptureFilter filter = 5;
}

message StopCaptureCommand {
  string command_id = 1;
  string capture_job_id = 2;
}

message CommandResult {
  string command_id = 1;
  bool succeeded = 2;
  string stop_reason = 3;
  uint64 captured_packets = 4;
  uint64 captured_bytes = 5;
  string error_code = 6;
  string error_message = 7;
}

message SensorEnvelope {
  oneof body {
    SensorRegistration registration = 1;
    Heartbeat heartbeat = 2;
    FlowBatch flow_batch = 3;
    LossReport loss_report = 4;
    CommandResult command_result = 5;
  }
}

message ControllerEnvelope {
  oneof body {
    BatchAck batch_ack = 1;
    CaptureCommand capture_command = 2;
    StopCaptureCommand stop_capture_command = 3;
  }
}
